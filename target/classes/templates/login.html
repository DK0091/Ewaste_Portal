<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EcoRecycle</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Global CSS -->
    <link rel="stylesheet" th:href="@{/css/global.css}">
</head>
<body class="auth-bg d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5 col-xl-4 text-center">
            
            <a th:href="@{/}" class="text-decoration-none text-white d-inline-block mb-4 hover-float">
                <i class="fa-solid fa-recycle fa-3x text-gradient bg-white rounded-circle p-3 shadow-lg"></i>
            </a>

            <div class="glass-panel text-start p-4 p-md-5">
                <h3 class="fw-bold brand-font text-dark mb-1 text-center">Welcome Back</h3>
                <p class="text-muted text-center mb-4 small">Securely login to your account</p>

                <!-- Alerts -->
                <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center rounded-3 mb-4 shadow-sm" role="alert">
                    <i class="fa-solid fa-triangle-exclamation me-2"></i>
                    <div>Invalid username or password!</div>
                </div>
                <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center rounded-3 mb-4 shadow-sm" role="alert">
                    <i class="fa-solid fa-circle-check me-2"></i>
                    <div>You have been securely logged out.</div>
                </div>
                <div th:if="${param.registered}" class="alert alert-success d-flex align-items-center rounded-3 mb-4 shadow-sm" role="alert">
                    <i class="fa-solid fa-circle-check me-2"></i>
                    <div>Registration Complete! You can now log in.</div>
                </div>

                <form th:action="@{/login}" method="post" class="needs-validation" novalidate id="loginForm">
                    <div class="mb-4">
                        <label for="username" class="form-label text-dark fw-semibold small text-uppercase tracking-wider">Username</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0 bg-white"><i class="fa-solid fa-user text-muted"></i></span>
                            <input type="text" id="username" name="username" class="form-control border-start-0 py-2 ps-0" placeholder="Enter your username" required />
                            <div class="invalid-feedback">Username is required.</div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label text-dark fw-semibold small text-uppercase tracking-wider">Password</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0 bg-white"><i class="fa-solid fa-lock text-muted"></i></span>
                            <input type="password" id="password" name="password" class="form-control border-start-0 border-end-0 py-2 ps-0" placeholder="Enter your password" required />
                            <span class="input-group-text bg-white" style="cursor: pointer" id="togglePassword">
                                <i class="fa-regular fa-eye text-muted"></i>
                            </span>
                            <div class="invalid-feedback">Password is required.</div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-pill hover-float shadow-lg position-relative" id="submitBtn">
                        <span id="btnText"><i class="fa-solid fa-right-to-bracket me-2"></i> LOGIN</span>
                        <div class="spinner-border spinner-border-sm text-light position-absolute top-50 start-50 translate-middle d-none" id="btnSpinner" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </button>
                </form>

                <div class="text-center mt-4 pt-3 border-top">
                    <span class="text-muted small">New to the portal?</span> 
                    <a th:href="@{/register}" class="text-primary fw-bold text-decoration-none ms-1">Create an account</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Validation
    (function () {
        'use strict'
        var forms = document.querySelectorAll('.needs-validation')
        Array.prototype.slice.call(forms)
            .forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    } else {
                        // Show Loading Spinner
                        const btnText = document.getElementById('btnText');
                        const btnSpinner = document.getElementById('btnSpinner');
                        const submitBtn = document.getElementById('submitBtn');
                        
                        btnText.classList.add('d-none');
                        btnSpinner.classList.remove('d-none');
                        submitBtn.classList.add('disabled');
                    }
                    form.classList.add('was-validated')
                }, false)
            })
    })();

    // Toggle Password Visibility
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');
    const icon = togglePassword.querySelector('i');

    togglePassword.addEventListener('click', function (e) {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
    });
</script>
</body>
</html>
