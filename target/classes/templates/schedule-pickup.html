<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Pickup - EcoRecycle</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Global CSS -->
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <script th:src="@{/js/theme.js}"></script>
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-gradient-primary sticky-top shadow-sm">
    <div class="container-fluid px-4">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/citizen/dashboard}">
            <i class="fa-solid fa-recycle me-2 text-white"></i>
            <span>EcoRecycle</span>
        </a>
        <button id="themeToggleBtn" onclick="toggleTheme()" title="Toggle Theme"><i class="fa-solid fa-moon"></i></button>
    </div>
</nav>

<div class="container py-5 fade-in">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="mb-4">
                <a th:href="@{/citizen/dashboard}" class="text-decoration-none text-muted mb-3 d-inline-block hover-float">
                    <i class="fa-solid fa-arrow-left me-1"></i> Back to Dashboard
                </a>
                <h2 class="fw-bold brand-font text-dark mb-1">Schedule a Pickup</h2>
                <p class="text-muted mb-0">Fill out the form below to arrange an e-waste collection.</p>
            </div>

            <div class="modern-card p-4 p-md-5">
                <form th:action="@{/citizen/schedule}" method="post" class="needs-validation" novalidate>
                    
                    <div class="mb-4">
                        <label for="address" class="form-label text-dark fw-semibold small text-uppercase tracking-wider"><i class="fa-solid fa-location-dot me-1"></i> Collection Address</label>
                        <textarea class="form-control bg-light" id="address" name="address" rows="3" placeholder="Enter your full pickup address" required></textarea>
                        <div class="invalid-feedback">Please provide a valid address.</div>
                    </div>

                    <div class="mb-4">
                        <label for="date" class="form-label text-dark fw-semibold small text-uppercase tracking-wider"><i class="fa-solid fa-calendar-day me-1"></i> Preferred Date</label>
                        <input type="date" class="form-control bg-light" id="date" name="date" required>
                        <div class="invalid-feedback">Please select a valid date.</div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label for="itemType" class="form-label text-dark fw-semibold small text-uppercase tracking-wider"><i class="fa-solid fa-laptop me-1"></i> Main Item Type</label>
                            <select class="form-select bg-light" id="itemType" name="itemType" required>
                                <option value="" selected disabled>Select an item</option>
                                <option value="Mobile/Tablet">Mobile / Tablet</option>
                                <option value="Laptop/PC">Laptop / PC</option>
                                <option value="Appliance">Home Appliance</option>
                                <option value="Cables/Accessories">Cables / Accessories</option>
                                <option value="Other">Other Electronics</option>
                            </select>
                            <div class="invalid-feedback">Please select an item type.</div>
                        </div>

                        <div class="col-md-6">
                            <label for="weight" class="form-label text-dark fw-semibold small text-uppercase tracking-wider"><i class="fa-solid fa-weight-scale me-1"></i> Approx Weight (kg)</label>
                            <input type="number" step="0.1" min="0.1" class="form-control bg-light" id="weight" name="weight" placeholder="e.g. 1.5" required>
                            <div class="invalid-feedback">Please enter approximate weight in kg.</div>
                        </div>
                    </div>

                    <hr class="my-4 text-muted">

                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-pill hover-float shadow-sm position-relative" id="submitBtn">
                        <span id="btnText"><i class="fa-solid fa-truck-fast me-2"></i> Confirm Schedule</span>
                        <div class="spinner-border spinner-border-sm text-light position-absolute top-50 start-50 translate-middle d-none" id="btnSpinner" role="status">
                            <span class="visually-hidden">Wait...</span>
                        </div>
                    </button>
                </form>
            </div>

        </div>
    </div>
</div>

<script>
    // Validation
    (function () {
        'use strict'
        var forms = document.querySelectorAll('.needs-validation')

        // Set min date to today
        var today = new Date().toISOString().split('T')[0];
        document.getElementById("date").setAttribute('min', today);

        Array.prototype.slice.call(forms)
            .forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    } else {
                        // Button loading state
                        const btnText = document.getElementById('btnText');
                        const btnSpinner = document.getElementById('btnSpinner');
                        const submitBtn = document.getElementById('submitBtn');
                        
                        btnText.classList.add('d-none');
                        btnSpinner.classList.remove('d-none');
                        submitBtn.classList.add('disabled');
                    }
                    form.classList.add('was-validated')
                }, false)
            })
    })();
</script>
</body>
</html>
