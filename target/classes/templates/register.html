<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EcoRecycle</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Global CSS -->
    <link rel="stylesheet" th:href="@{/css/global.css}">
</head>
<body class="auth-bg d-flex align-items-center justify-content-center py-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 text-center">
            
            <a th:href="@{/}" class="text-decoration-none text-white d-inline-block mb-4 hover-float">
                <i class="fa-solid fa-recycle fa-3x text-gradient bg-white rounded-circle p-3 shadow-lg"></i>
            </a>

            <div class="glass-panel text-start p-4 p-md-5">
                <h3 class="fw-bold brand-font text-dark mb-1 text-center">Join the Movement</h3>
                <p class="text-muted text-center mb-4 small">Create an account to manage your e-waste</p>

                <form th:action="@{/register}" method="post" class="needs-validation" novalidate id="registerForm">
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="name" class="form-label text-dark fw-semibold small text-uppercase tracking-wider">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text border-end-0 bg-white"><i class="fa-solid fa-id-card text-muted"></i></span>
                                <input type="text" id="name" name="name" class="form-control border-start-0 py-2 ps-0" placeholder="John Doe" required />
                                <div class="invalid-feedback">Full name is required.</div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label for="email" class="form-label text-dark fw-semibold small text-uppercase tracking-wider">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text border-end-0 bg-white"><i class="fa-solid fa-envelope text-muted"></i></span>
                                <input type="email" id="email" name="email" class="form-control border-start-0 py-2 ps-0" placeholder="john@example.com" required />
                                <div class="invalid-feedback">Valid email is required.</div>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="username" class="form-label text-dark fw-semibold small text-uppercase tracking-wider">Username</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0 bg-white"><i class="fa-solid fa-user text-muted"></i></span>
                            <input type="text" id="username" name="username" class="form-control border-start-0 py-2 ps-0" placeholder="Choose a username" required minlength="4"/>
                            <div class="invalid-feedback">Username must be at least 4 characters.</div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label text-dark fw-semibold small text-uppercase tracking-wider">Password</label>
                        <div class="input-group">
                            <span class="input-group-text border-end-0 bg-white"><i class="fa-solid fa-lock text-muted"></i></span>
                            <input type="password" id="password" name="password" class="form-control border-start-0 border-end-0 py-2 ps-0" placeholder="Create a password" required minlength="6"/>
                            <span class="input-group-text bg-white" style="cursor: pointer" id="togglePassword">
                                <i class="fa-regular fa-eye text-muted"></i>
                            </span>
                            <div class="invalid-feedback">Password must be at least 6 characters.</div>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label text-dark fw-semibold small text-uppercase tracking-wider">Select Role</label>
                        <div class="d-flex gap-3 mt-1">
                            <div class="form-check p-0 flex-grow-1">
                                <input type="radio" class="btn-check" name="role" id="roleCitizen" autocomplete="off" value="ROLE_CITIZEN" checked required>
                                <label class="btn btn-outline-primary d-block w-100 py-3 rounded-3" for="roleCitizen">
                                    <i class="fa-solid fa-user mb-2 fs-4"></i><br>Citizen
                                </label>
                            </div>
                            <div class="form-check p-0 flex-grow-1">
                                <input type="radio" class="btn-check" name="role" id="roleRecycler" autocomplete="off" value="ROLE_RECYCLER" required>
                                <label class="btn btn-outline-primary d-block w-100 py-3 rounded-3" for="roleRecycler">
                                    <i class="fa-solid fa-truck-fast mb-2 fs-4"></i><br>Recycler
                                </label>
                            </div>
                            <div class="form-check p-0 flex-grow-1">
                                <input type="radio" class="btn-check" name="role" id="roleAdmin" autocomplete="off" value="ROLE_ADMIN" required>
                                <label class="btn btn-outline-primary d-block w-100 py-3 rounded-3" for="roleAdmin">
                                    <i class="fa-solid fa-shield-halved mb-2 fs-4"></i><br>Admin
                                </label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3 mt-2 fw-bold rounded-pill hover-float shadow-lg position-relative" id="submitBtn">
                        <span id="btnText"><i class="fa-solid fa-user-plus me-2"></i> CREATE ACCOUNT</span>
                        <div class="spinner-border spinner-border-sm text-light position-absolute top-50 start-50 translate-middle d-none" id="btnSpinner" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </button>
                </form>

                <div class="text-center mt-4 pt-3 border-top">
                    <span class="text-muted small">Already have an account?</span> 
                    <a th:href="@{/login}" class="text-primary fw-bold text-decoration-none ms-1">Login here</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Validation
    (function () {
        'use strict'
        var forms = document.querySelectorAll('.needs-validation')
        Array.prototype.slice.call(forms)
            .forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    } else {
                        // Show Loading Spinner
                        const btnText = document.getElementById('btnText');
                        const btnSpinner = document.getElementById('btnSpinner');
                        const submitBtn = document.getElementById('submitBtn');
                        
                        btnText.classList.add('d-none');
                        btnSpinner.classList.remove('d-none');
                        submitBtn.classList.add('disabled');
                    }
                    form.classList.add('was-validated')
                }, false)
            })
    })();

    // Toggle Password Visibility
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');
    const icon = togglePassword.querySelector('i');

    togglePassword.addEventListener('click', function (e) {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
    });
</script>
</body>
</html>
