<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - EcoRecycle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <script th:src="@{/js/theme.js}"></script>
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh;">
<div class="text-center px-4" style="max-width:520px;">
    <div class="mb-4">
        <i class="fa-solid fa-triangle-exclamation fa-4x text-warning mb-3"></i>
        <h1 class="brand-font fw-bold fs-2" th:text="${status != null} ? 'Error ' + ${status} : 'Oops!'">Oops!</h1>
        <p class="text-muted fs-5 mt-2"
           th:text="${message != null} ? ${message} : 'Something went wrong or you do not have permission to access this page.'">
            Something went wrong or you do not have permission to access this page.
        </p>
    </div>
    <div class="d-flex justify-content-center gap-3 flex-wrap">
        <a href="javascript:history.back()" class="btn btn-outline-secondary rounded-pill px-4">
            <i class="fa-solid fa-arrow-left me-1"></i> Go Back
        </a>
        <a th:href="@{/}" class="btn btn-primary rounded-pill px-4">
            <i class="fa-solid fa-house me-1"></i> Home
        </a>
    </div>
    <p class="text-muted small mt-5 opacity-50">EcoRecycle Portal &mdash; Error Page</p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
