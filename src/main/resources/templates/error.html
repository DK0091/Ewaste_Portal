<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - EcoRecycle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/global.css}">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

<div class="text-center fade-in">
    <i class="fa-solid fa-triangle-exclamation text-warning text-opacity-75 mb-4" style="font-size: 6rem;"></i>
    <h1 class="display-3 fw-bold brand-font text-dark mb-2">Oops!</h1>
    <h4 class="text-muted mb-4">Something went wrong or the page was not found.</h4>
    
    <div class="mb-5">
        <p class="text-danger small bg-danger bg-opacity-10 d-inline-block px-3 py-2 rounded-3" th:if="${message}" th:text="${message}"></p>
    </div>

    <a th:href="@{/}" class="btn btn-primary btn-lg rounded-pill px-5 shadow-sm hover-float fw-bold">
        <i class="fa-solid fa-house me-2"></i> Return Home
    </a>
</div>

</body>
</html>
